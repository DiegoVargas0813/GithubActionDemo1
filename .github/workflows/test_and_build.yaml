name: Test and Build

on: #Cuando se ejecuta
  push:
    branches: [ "main" ]

permissions: # Que tenga permiso de...
  contents: read # ...leer el contenido del repositorio

jobs:
  test_and_build: 
    runs-on: ubuntu-latest # Imagen de Linux que se ejecutara en un contenedor.

    steps:
    - uses: actions/checkout@v4 # Haz un checkout de la rama, es decir traer el codigo.
    - name: Set up Python 3.11
      uses: actions/setup-python@v3 # Accion de instalacion de python
      with:
        python-version: "3.11" 
    - name: Install dependencies 
      run: pip install -r src/requirements.txt
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pytest
